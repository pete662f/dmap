services:
  tileserver:
    image: maptiler/tileserver-gl-light:v5.5.0
    container_name: dmap2-tileserver
    ports:
      - "8080:8080"
    volumes:
      - ./tileserver:/data
      - ./data:/data/data:ro
    restart: unless-stopped
  photon:
    build:
      context: ./services/photon
    container_name: dmap2-photon
    ports:
      - "8081:2322"
    environment:
      PHOTON_CORS_MODE: any
      PHOTON_DEFAULT_LANGUAGE: da
      PHOTON_JAVA_XMX: 2g
      PHOTON_MAX_RESULTS: 8
      PHOTON_MAX_REVERSE_RESULTS: 3
      PHOTON_QUERY_TIMEOUT: 4
    volumes:
      - ./data/search/photon:/srv/photon
    restart: unless-stopped
