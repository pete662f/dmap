services:
  tileserver:
    image: maptiler/tileserver-gl-light:v5.5.0
    container_name: dmap2-tileserver
    ports:
      - "${DMAP_BIND_HOST:-127.0.0.1}:8080:8080"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./tileserver:/data
      - ./data:/data/data:ro
    restart: unless-stopped
  photon:
    build:
      context: ./services/photon
    container_name: dmap2-photon
    ports:
      - "${DMAP_BIND_HOST:-127.0.0.1}:8081:2322"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 3g
    environment:
      PHOTON_CORS_MODE: any
      PHOTON_DEFAULT_LANGUAGE: da
      PHOTON_JAVA_XMS: 1g
      PHOTON_JAVA_XMX: 2g
      PHOTON_JAVA_EXTRA_FLAGS: --add-modules=jdk.incubator.vector --enable-native-access=ALL-UNNAMED
      PHOTON_MAX_RESULTS: 8
      PHOTON_MAX_REVERSE_RESULTS: 3
      PHOTON_QUERY_TIMEOUT: 4
    volumes:
      - ./data/search/photon/photon.jar:/srv/photon/photon.jar:ro
      - photon_data:/srv/photon/photon_data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -lc 'exec 3<>/dev/tcp/127.0.0.1/2322 &&
          printf "GET /status HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 &&
          grep -q "200 OK" <&3'
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped
  ortofoto-proxy:
    build:
      context: ./services/ortofoto-proxy
    container_name: dmap2-ortofoto-proxy
    ports:
      - "${DMAP_BIND_HOST:-127.0.0.1}:8083:8080"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    mem_limit: 256m
    environment:
      DMAP_ORTHOFOTO_TOKEN: ${DMAP_ORTHOFOTO_TOKEN:-}
      DMAP_ORTHOFOTO_TOKEN_FILE: ${DMAP_ORTHOFOTO_TOKEN_FILE:-}
      DMAP_ORTHOFOTO_TIMEOUT_MS: ${DMAP_ORTHOFOTO_TIMEOUT_MS:-8000}
      DMAP_ORTHOFOTO_UPSTREAM_URL: ${DMAP_ORTHOFOTO_UPSTREAM_URL:-https://api.dataforsyningen.dk/orto_foraar_webm_DAF}
    restart: unless-stopped

volumes:
  photon_data:
    name: ${PHOTON_DATA_VOLUME_NAME:-dmap2_photon_data}
    external: true
